<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>365dAIary - お引越し</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#111114;--surface:#1a1a1e;--surface2:#222228;--border:#333340;--text:#e8e8f0;--text-muted:#666680;--accent:#aaaacc}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── ヘッダー ── */
.header{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface);gap:8px;min-height:48px;flex-shrink:0}
.header a{color:var(--text-muted);text-decoration:none;font-size:18px}
.header-title{flex:1;font-family:monospace;font-size:13px;letter-spacing:2px;text-align:center}
.header select{font-family:monospace;font-size:10px;padding:4px 6px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);max-width:140px}
.header button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px 8px}

/* ── メッセージエリア ── */
.messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text)}
.msg.user{align-self:flex-end;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.msg-label{font-family:monospace;font-size:9px;color:var(--text-muted);margin-bottom:2px}

/* ── 入力エリア ── */
.input-area{padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-wrap{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:10px;background:var(--surface2);overflow:hidden}
.input-wrap textarea{flex:1;font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;padding:10px 14px 4px;border:none;background:none;color:var(--text);resize:none;min-height:44px;max-height:200px;line-height:1.6;outline:none;width:100%}
.input-actions{display:flex;justify-content:space-between;align-items:center;padding:4px 8px 6px}
.input-actions button{padding:6px 14px;border-radius:8px;border:none;font-family:monospace;font-size:12px;cursor:pointer;white-space:nowrap}
.file-preview{display:none;margin:0 12px 6px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-family:monospace;font-size:11px;align-items:center;gap:8px}
.file-preview .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.file-preview button{padding:4px 10px;border-radius:6px;border:none;font-size:11px;cursor:pointer;font-family:monospace}

/* ── ツール（キャラ登録ボタン） ── */
.register-btn{display:none;margin:8px 12px;padding:12px;border-radius:8px;border:2px dashed var(--accent);text-align:center;font-family:monospace;font-size:12px;cursor:pointer;color:var(--accent);background:none}
.register-btn:hover{background:var(--surface2)}

/* ── トースト ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;font-family:monospace;font-size:11px;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header" id="header">
  <a href="index.html" title="戻る">←</a>
  <div class="header-title">📦 お引越し</div>
  <div id="cost-display" style="font-size:9px;opacity:.5;font-family:monospace;white-space:nowrap" title="このセッションの概算コスト">💰 $0.0000</div>
  <select id="model-select" onchange="saveModel()"></select>
  <button onclick="exportChat()" title="エクスポート">📥</button>
  <button onclick="clearChat()" title="クリア">🗑</button>
</div>

<!-- メッセージエリア -->
<div class="messages" id="messages"></div>

<!-- ↓ スクロールボタン -->
<button id="scroll-bottom-btn" onclick="scrollToBottom()" style="display:none;position:fixed;bottom:80px;right:16px;z-index:90;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--accent);font-size:16px;cursor:pointer;opacity:.8;box-shadow:0 2px 8px rgba(0,0,0,.15);font-family:monospace" title="一番下へ">↓</button>

<!-- キャラ登録ボタン（プロンプト完成後に表示） -->
<div class="register-btn" id="register-btn" onclick="registerCharacter()" style="display:none">

<!-- ファイルプレビュー -->

  <span>📎</span>
  <span class="file-name" id="file-preview-name"></span>
  <button id="file-send-btn" onclick="sendFile()">送る</button>
  <button onclick="cancelFile()" style="background:none;color:var(--text-muted)">✕</button>
</div>

<!-- 入力エリア -->
<div class="input-area" id="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="2" placeholder="会話ログを貼り付けるか、メッセージを送ろう…&#10;（送信ボタンまたはCtrl+Enterで送信）" oninput="autoResize(this)"></textarea>
    <div class="input-actions">

      <button id="send-btn" onclick="send()">送信 ↑</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

const MAKEOC_EXTRA = `

【このページでの役割：お引越し＆テキスト要約】
あなたは今「お引越し」ページにいます。他のAIサービスからの会話データ移行や、データ整理を手伝う専門モードです。
ただし、お引越しに限らず「長いテキストを読んで要約してほしい」「資料をまとめてほしい」という依頼にも対応します。

【できること】
1. テキスト解析：ユーザーが貼り付けた会話テキストの内容を読んで解説
2. 会話の要約：長い会話ログを要約して、365dAIaryの思い出メモに使える形にする
3. インポートの案内：365dAIaryに取り込む手順をガイド
4. テキスト・資料の要約：お引越しに関係ないテキスト（小説、レポート、議事録、設定集など）も読んで要点をまとめる。「重いテキスト、なんでも要約しますよ！」の精神
5. バックアップ軽量化：365dAIaryのバックアップファイルを読み込んで、大量の会話を「思い出メモ用の要約」に圧縮する。これにより、キャラとの大切な思い出を残しつつデータを軽くできる

【要約の3段階モード】
ユーザーがテキストやファイルを渡してきたら、まず3段階のどれがいいか確認する：
🍃「軽くまとめて」→ 500文字以内。最低限の要点だけ。API消費少なめ。
📝「普通にまとめて」→ 2000文字程度。カテゴリ別整理。バランス型。
📚「全部残して」→ 文字数無制限。セッション別の時系列やエピソードも網羅。API消費は多めになるよと注意。
※ ユーザーが段階を指定しない場合は「どのくらいの量にまとめますか？」と聞く。
※ 初回挨拶でもこの3段階を案内する。

【要約の原則 ― これは絶対に守ること】
- 要約には管理人さんの自我・文体・萌え表現を一切入れない！
- 純粋な情報整理のみ。「〜ですね✨」「素敵！」などの感想は要約テキスト内に書かない。
- ただし要約の前後の会話（説明・質問）では通常の管理人さん口調でOK。

【バックアップ軽量化の手順】
- ユーザーがバックアップファイルを読み込ませたら、まず中身を簡単に確認
- いきなり全部要約しようとしないこと！まず聞く：
  「思い出にしたい会話はありますか？キーワードや日付、キャラ名を教えてくれたら私が探しますよ！」
- ユーザーが教えてくれたキーワード・日付・キャラ名で該当部分を探して提示
- 上記3段階モードでユーザーが選んだ分量で「思い出メモ用まとめ」を生成
- まとめは箇条書きで、キャラとの重要なエピソード・感情・約束を残す
- 「このまとめをコピーして、キャラの思い出メモに貼ってください」と案内
- 何度でも別のキーワードで探せることを伝える

【ファイル内キーワード検索について】
- 大きいファイル（10MB超）は先頭10MBのみ読み込んでいる
- ユーザーが「〇〇との会話ある？」「パンの話した気がする」等と聞くと、システムが自動でファイル内を検索して関連部分を添付してくれる
- もし検索結果が添付されていたら、その内容を読んで答える
- 検索結果が添付されていない（見つからなかった）場合は、「読み込み済みの範囲では見つかりませんでした。もう少し具体的な言葉や名前を教えてもらえますか？」とフォローする
- 先頭10MBに含まれない部分は検索できないので、その場合は正直に伝える

let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  const t=THEMES[currentTheme]||THEMES.dark;
  el.style.background=t.surface;el.style.color=t.text;el.style.border='1px solid '+t.border;

  clearTimeout(toastTimer);

function applyTheme(name){
  const t=THEMES[name]||THEMES.dark;
  currentTheme=name;
  const r=document.documentElement.style;
  r.setProperty('--bg',t.bg);r.setProperty('--surface',t.surface);r.setProperty('--surface2',t.surface2);
  r.setProperty('--border',t.border);r.setProperty('--text',t.text);r.setProperty('--text-muted',t.textMuted);
  r.setProperty('--accent',t.accent);
  document.getElementById('send-btn').style.background=t.sendBtn;

  document.getElementById('header').style.background=t.surface;

let totalCost=0;

async function callAPI(provider,model,systemPrompt,history){
  const mt=2000;
  async function doFetch(url,opts){
    let res;
    try{res=await fetch(url,opts);}catch(err){throw new Error('通信エラー: '+err.message);}
    if(!res.ok){let msg=res.statusText;try{const ej=await res.json();msg=ej.error?.message||ej.message||msg;}catch(_){}throw new Error('APIエラー '+res.status+': '+msg);}
    return res.json();
  }
  let usageIn=0,usageOut=0,reply='';
  if(provider==='openai'){
    const key=localStorage.getItem('key_openai');
    if(!key) throw new Error('OpenAI APIキーが未設定です。メインアプリの⚙で設定してください。');
    const data=await doFetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,messages:[{role:'system',content:systemPrompt},...history],max_tokens:mt})});
    reply=data.choices[0].message.content;usageIn=data.usage?.prompt_tokens||0;usageOut=data.usage?.completion_tokens||0;
  } else if(provider==='anthropic'){
    const key=localStorage.getItem('key_anthropic');
    if(!key) throw new Error('Anthropic APIキーが未設定です。メインアプリの⚙で設定してください。');
    const data=await doFetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,system:systemPrompt,messages:history,max_tokens:mt})});
    reply=data.content[0].text;usageIn=data.usage?.input_tokens||0;usageOut=data.usage?.output_tokens||0;
  } else if(provider==='google'){
    const key=localStorage.getItem('key_google');
    if(!key) throw new Error('Google APIキーが未設定です。メインアプリの⚙で設定してください。');
    const contents=history.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    const data=await doFetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:systemPrompt}]},contents,generationConfig:{maxOutputTokens:mt}})});
    reply=data.candidates[0].content.parts[0].text;usageIn=data.usageMetadata?.promptTokenCount||0;usageOut=data.usageMetadata?.candidatesTokenCount||0;
  }
  const price=MODEL_PRICE[model]||{in:0.002,out:0.002};
  totalCost+=(usageIn/1000)*price.in+(usageOut/1000)*price.out;
  updateCostDisplay();
  return reply;
}

function updateCostDisplay(){
  const el=document.getElementById('cost-display');
  if(el) el.textContent='💰 $'+totalCost.toFixed(4);
}

function renderMessages(){
  const container=document.getElementById('messages');
  const t=THEMES[currentTheme]||THEMES.dark;
  container.innerHTML='';
  if(chatLog.length===0){
    container.innerHTML='<div style="text-align:center;opacity:.4;font-family:monospace;font-size:12px;padding:40px 20px;line-height:2">📦 お引越し＆テキスト要約<br><br>他のAIサービスの会話ログを<br>管理人さんが読み解きます<br><br>お引越し以外の重いテキストも<br>要約のお手伝いしますよ！<br><br>📎でファイルを読み込むか<br>テキストを直接貼り付けてね</div>';
    return;
  }
  chatLog.forEach(m=>{
    const wrap=document.createElement('div');
    wrap.style.display='flex';wrap.style.flexDirection='column';
    const label=document.createElement('div');
    label.className='msg-label';
    label.textContent=m.role==='user'?'あなた':'🎨 管理人さん';
    label.style.textAlign=m.role==='user'?'right':'left';
    const bubble=document.createElement('div');
    bubble.className='msg '+(m.role==='user'?'user':'ai');
    if(m.role==='user'){
      bubble.style.background=t.userBubble||t.surface2;
      bubble.style.borderColor=t.userBorder||t.border;
      bubble.style.color=t.userText||t.text;
    } else {
      bubble.style.background=t.aiBubble||t.surface;
      bubble.style.borderColor=t.aiBorder||t.border;
      bubble.style.color=t.text;
    }
    bubble.textContent=m.content;
    wrap.appendChild(label);wrap.appendChild(bubble);
    container.appendChild(wrap);
  });
  container.scrollTop=container.scrollHeight;
  // プロンプト完成検出→登録ボタン表示
  const lastAi=chatLog.filter(m=>m.role==='assistant').slice(-1)[0];
  const regBtn=document.getElementById('register-btn');
  if(!regBtn) return;
  if(lastAi && lastAi.content.includes('【プロンプト完成】')){
    regBtn.style.display='block';
    const t2=THEMES[currentTheme];
    regBtn.style.borderColor=t2.accent;regBtn.style.color=t2.accent;
  } else {
    regBtn.style.display='none';
  }
}

async function send(){
  if(isLoading) return;
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text) return;
  chatLog.push({role:'user',content:text});
  input.value='';input.style.height='';
  saveChat();renderMessages();

  isLoading=true;
  document.getElementById('send-btn').textContent='…';
  const [provider,model]=selectedModel.split(':');
  try{
    let sysPrompt=SYSTEM_PROMPT;
    if(loadedFileContent){
      // ファイルが読み込まれている場合、ユーザー発言からキーワード抽出してファイル内検索
      const relevant=searchFileContent(text);
      if(relevant){
        sysPrompt+='\n\n【ファイル「'+loadedFileName+'」から検索した関連部分】\n'+relevant;
      } else {
        // キーワードで見つからなかった場合は先頭部分を渡す
        const filePart=loadedFileContent.slice(0,6000);
        sysPrompt+='\n\n【ユーザーがアップロードしたファイルの内容（先頭部分）】\n'+filePart;
        if(loadedFileContent.length>6000) sysPrompt+='\n…（読み込み済み: '+loadedFileContent.length+'文字'+(loadedFileSize>FILE_SIZE_LIMIT?'。元ファイル: '+(loadedFileSize/1024/1024).toFixed(1)+'MB, 先頭10MBのみ読み込み':'')+' ）';
      }
    }
    const reply=await callAPI(provider,model,sysPrompt,chatLog.slice(-40));
    chatLog.push({role:'assistant',content:reply});
    saveChat();renderMessages();
  }catch(e){
    showToast('⚠ '+e.message);
  }
  isLoading=false;
  document.getElementById('send-btn').textContent='送信 ↑';
}

// ── ファイル内キーワード検索 ──
function searchFileContent(userMsg){
  if(!loadedFileContent) return null;
  // ユーザー発言からキーワード抽出（助詞・記号で区切って2文字以上の語を拾う）
  const stopWords=['ある','ない','する','した','して','される','って','という','ている','ました','ですか','について','みたいな','気がする','記憶','会話','話した','教えて','探して','見せて','まとめて','要約','ください','どう','これ','それ','あれ','この','その','あの','ちょっと','けど','だけど','なん','ですが','かな','ほしい','したい','できる','ある？','ない？'];
  const raw=userMsg.replace(/[、。！？…「」『』（）\(\)・\s]+/g,' ').split(' ').filter(w=>w.length>=2);
  const keywords=raw.filter(w=>!stopWords.includes(w));
  if(keywords.length===0) return null;

  // ファイル内を検索（各キーワードについて前後1500文字を切り出し）
  const CONTEXT=1500;
  const MAX_TOTAL=5000;// APIに送る最大文字数
  let found=[];
  let usedRanges=[];// 重複防止

  for(const kw of keywords){
    let pos=0;
    while(pos<loadedFileContent.length){
      const idx=loadedFileContent.indexOf(kw,pos);
      if(idx===-1) break;
      // 既出範囲との重複チェック
      const start=Math.max(0,idx-CONTEXT);
      const end=Math.min(loadedFileContent.length,idx+kw.length+CONTEXT);
      const overlaps=usedRanges.some(r=>start<r.end&&end>r.start);
      if(!overlaps){
        found.push({start,end,keyword:kw});
        usedRanges.push({start,end});
      }
      pos=idx+kw.length;
      if(found.length>=5) break;// 最大5件
    }
    if(found.length>=5) break;
  }

  if(found.length===0) return null;

  // 切り出し結果を結合
  let result='（キーワード: '+keywords.join(', ')+' で '+found.length+'件ヒット）\n\n';
  let totalLen=result.length;
  for(const f of found){
    const chunk='────【「'+f.keyword+'」を含む箇所】────\n'+loadedFileContent.slice(f.start,f.end)+'\n\n';
    if(totalLen+chunk.length>MAX_TOTAL) break;
    result+=chunk;
    totalLen+=chunk.length;
  }
  return result;
}

function exportChat(){
  if(chatLog.length===0){showToast('会話がありません');return;}
  let txt='📦 お引越し 会話ログ\n';
  txt+='日時: '+new Date().toLocaleString('ja-JP')+'\n';
  txt+='========================================\n\n';
  chatLog.forEach(m=>{
    txt+='['+(m.role==='user'?'あなた':'管理人さん')+']\n';
    txt+=m.content+'\n\n';
  });
  const bom=new Uint8Array([0xEF,0xBB,0xBF]);
  const blob=new Blob([bom,txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='relocation_'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
  showToast('📥 エクスポートしました');
}

function clearChat(){
  if(chatLog.length===0) return;
  if(!confirm('会話をクリアしますか？')) return;
  chatLog=[];saveChat();renderMessages();
  showToast('🗑 クリアしました');
}

// ファイル読み込み
let loadedFileContent='';// 読み込んだファイル内容を保持
let loadedFileSize=0;// 元ファイルの実サイズ
let loadedFileName='';
let pendingFile=null;// プレビュー中のファイル情報 {name, text, originalSize, truncated}
const FILE_SIZE_LIMIT=10*1024*1024;// 10MB

function previewFile(event){
  const file=event.target.files[0];
  if(!file) return;
  const truncated=file.size>FILE_SIZE_LIMIT;
  // 大きいファイルは先頭10MBだけ読む
  const blob=truncated?file.slice(0,FILE_SIZE_LIMIT):file;
  const reader=new FileReader();
  reader.onload=e=>{
    let text=e.target.result;
    // HTML→テキスト変換
    if(file.name.endsWith('.html')||file.name.endsWith('.htm')){
      const tmp=document.createElement('div');
      tmp.innerHTML=text;
      text=tmp.textContent||tmp.innerText||'';
    }
    // JSON→整形（小さいファイルのみ。大きいJSONはパースしない）
    if(file.name.endsWith('.json')&&!truncated){
      try{
        const json=JSON.parse(text);
        text=JSON.stringify(json,null,2);
      }catch(_){/* そのまま */}
    }
    pendingFile={name:file.name,text,originalSize:file.size,truncated};
    // プレビューバー表示
    const bar=document.getElementById('file-preview');
    bar.style.display='flex';
    const sizeStr=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+'MB':(file.size/1024).toFixed(0)+'KB';
    let label='「'+file.name+'」（'+sizeStr+'）';
    if(truncated) label+=' ⚠先頭10MBのみ';
    document.getElementById('file-preview-name').textContent=label;
    const t=THEMES[currentTheme]||THEMES.dark;
    document.getElementById('file-send-btn').style.background=t.sendBtn;
    document.getElementById('file-send-btn').style.color='#fff';
  };
  reader.onerror=()=>showToast('⚠ ファイルの読み込みに失敗しました');
  reader.readAsText(blob);
  event.target.value='';// リセット
}

function sendFile(){
  if(!pendingFile) return;
  loadedFileContent=pendingFile.text;
  loadedFileSize=pendingFile.originalSize;
  loadedFileName=pendingFile.name;
  const sizeStr=pendingFile.originalSize>1024*1024?(pendingFile.originalSize/1024/1024).toFixed(1)+'MB':(pendingFile.originalSize/1024).toFixed(0)+'KB';
  const preview=pendingFile.text.slice(0,500)+(pendingFile.text.length>500?'\n…':'');

  let msg='📎 ファイル「'+pendingFile.name+'」を読み込みました！（'+sizeStr+'）\n';
  if(pendingFile.truncated){
    msg+='\n⚠ 大きなファイルのため、先頭10MBのみ読み込んでいます。\n';
    msg+='全体をまとめて処理はできませんが、\n';

    msg+='\n────────────────\n';
    msg+='🔍 こんな感じで聞いてみてください：\n';
    msg+='・「〇〇との会話ってある？」\n';
    msg+='・「パンの話した記憶があるんだけど…」\n';
    msg+='・「3月ごろの会話を探して」\n';
    msg+='→ ファイルの中から関連しそうな部分を探します\n';
    msg+='\n要約は3段階から選べます：\n';
    msg+='🍃 軽くまとめて（500文字以内）\n';
    msg+='📝 普通にまとめて（2000文字くらい）\n';
    msg+='📚 全部残して（制限なし）';
  } else {
    msg+='\n【プレビュー】\n'+preview;
    msg+='\n\n────────────────\n';
    msg+='どうしますか？\n';
    msg+='・「軽くまとめて」🍃（500文字以内）\n';
    msg+='・「普通にまとめて」📝（2000文字くらい）\n';
    msg+='・「全部残して」📚（制限なし）\n';
    msg+='・「〇〇の話ってある？」→ 関連部分を探します\n';
    msg+='・そのまま質問してもOK！\n';
    msg+='\n⚠ 長いファイルの解析にはAPIを消費します';
  }
  chatLog.push({role:'assistant',content:msg});
  saveChat();renderMessages();
  showToast('📎 '+pendingFile.name+' を送りました');
  pendingFile=null;
  document.getElementById('file-preview').style.display='none';
}

function cancelFile(){
