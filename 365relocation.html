<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#111114;--surface:#1a1a1e;--surface2:#222228;--border:#333340;--text:#e8e8f0;--text-muted:#666680;--accent:#aaaacc}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── ヘッダー ── */
.header{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface);gap:8px;min-height:48px;flex-shrink:0}
.header a{color:var(--text-muted);text-decoration:none;font-size:18px}
.header-title{flex:1;font-family:monospace;font-size:13px;letter-spacing:2px;text-align:center}
.header select{font-family:monospace;font-size:10px;padding:4px 6px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);max-width:140px}
.header button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px 8px}

/* ── メッセージエリア ── */
.messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text)}
.msg.user{align-self:flex-end;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.msg-label{font-family:monospace;font-size:9px;color:var(--text-muted);margin-bottom:2px}

/* ── 入力エリア ── */
.input-area{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:var(--surface);align-items:flex-end;flex-shrink:0}
.input-area textarea{flex:1;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);resize:none;min-height:40px;max-height:120px;line-height:1.6}
.input-area button{padding:8px 16px;border-radius:8px;border:none;font-family:monospace;font-size:12px;cursor:pointer;white-space:nowrap}

/* ── ツール（キャラ登録ボタン） ── */
.register-btn{display:none;margin:8px 12px;padding:12px;border-radius:8px;border:2px dashed var(--accent);text-align:center;font-family:monospace;font-size:12px;cursor:pointer;color:var(--accent);background:none}
.register-btn:hover{background:var(--surface2)}

/* ── トースト ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;font-family:monospace;font-size:11px;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header" id="header">
  <a href="index.html" title="戻る">←</a>
  <div class="header-title">📦 お引越し</div>
  <select id="model-select" onchange="saveModel()"></select>
  <button onclick="exportChat()" title="エクスポート">📥</button>
  <button onclick="clearChat()" title="クリア">🗑</button>

<!-- メッセージエリア -->
<div class="messages" id="messages"></div>

<!-- キャラ登録ボタン（プロンプト完成後に表示） -->
<div class="register-btn" style="display:none()">
  🚀 このキャラを365dAIaryに登録する

<!-- 入力エリア -->
<div class="input-area" id="input-area">

let totalCost=0;

async function callAPI(provider,model,systemPrompt,history){
  const mt=2000;
  async function doFetch(url,opts){
    let res;
    try{res=await fetch(url,opts);}catch(err){throw new Error('通信エラー: '+err.message);}
    if(!res.ok){let msg=res.statusText;try{const ej=await res.json();msg=ej.error?.message||ej.message||msg;}catch(_){}throw new Error('APIエラー '+res.status+': '+msg);}
    return res.json();
  }
  let usageIn=0,usageOut=0,reply='';
  if(provider==='openai'){
    const key=localStorage.getItem('key_openai');
    if(!key) throw new Error('OpenAI APIキーが未設定です。メインアプリの⚙で設定してください。');
    const data=await doFetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,messages:[{role:'system',content:systemPrompt},...history],max_tokens:mt})});
    reply=data.choices[0].message.content;usageIn=data.usage?.prompt_tokens||0;usageOut=data.usage?.completion_tokens||0;
  } else if(provider==='anthropic'){
    const key=localStorage.getItem('key_anthropic');
    if(!key) throw new Error('Anthropic APIキーが未設定です。メインアプリの⚙で設定してください。');
    const data=await doFetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,system:systemPrompt,messages:history,max_tokens:mt})});
    reply=data.content[0].text;usageIn=data.usage?.input_tokens||0;usageOut=data.usage?.output_tokens||0;
  } else if(provider==='google'){
    const key=localStorage.getItem('key_google');
    if(!key) throw new Error('Google APIキーが未設定です。メインアプリの⚙で設定してください。');
    const contents=history.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    const data=await doFetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:systemPrompt}]},contents,generationConfig:{maxOutputTokens:mt}})});
    reply=data.candidates[0].content.parts[0].text;usageIn=data.usageMetadata?.promptTokenCount||0;usageOut=data.usageMetadata?.candidatesTokenCount||0;
  }
  const price=MODEL_PRICE[model]||{in:0.002,out:0.002};
  totalCost+=(usageIn/1000)*price.in+(usageOut/1000)*price.out;
  return reply;
}

  const t=THEMES[currentTheme]||THEMES.dark;
  container.innerHTML='';
  if(chatLog.length===0){
    container.innerHTML='<div style="text-align:center;opacity:.4;font-family:monospace;font-size:12px;padding:40px 20px;line-height:2">📦 お引越し<br><br>他のAIサービスの会話ログを<br>管理人さんが読み解きます<br><br>📎でファイルを読み込むか<br>テキストを直接貼り付けてね</div>';
    return;
  }
  chatLog.forEach(m=>{
    const wrap=document.createElement('div');
    wrap.style.display='flex';wrap.style.flexDirection='column';
    const label=document.createElement('div');
    label.className='msg-label';
    label.textContent=m.role==='user'?'あなた':'🎨 管理人さん';
    label.style.textAlign=m.role==='user'?'right':'left';
    const bubble=document.createElement('div');
    bubble.className='msg '+(m.role==='user'?'user':'ai');
    if(m.role==='user'){
      bubble.style.background=t.userBubble||t.surface2;
      bubble.style.borderColor=t.userBorder||t.border;
      bubble.style.color=t.userText||t.text;
    } else {
      bubble.style.background=t.aiBubble||t.surface;
      bubble.style.borderColor=t.aiBorder||t.border;
      bubble.style.color=t.text;
    }
    bubble.textContent=m.content;
    wrap.appendChild(label);wrap.appendChild(bubble);
    container.appendChild(wrap);
  });
  container.scrollTop=container.scrollHeight;
  // プロンプト完成検出→登録ボタン表示
  const lastAi=chatLog.filter(m=>m.role==='assistant').slice(-1)[0];
  const regBtn=document.getElementById('register-btn');
  if(lastAi && lastAi.content.includes('【プロンプト完成】')){
    regBtn.style.display='block';
    const t2=THEMES[currentTheme];
    regBtn.style.borderColor=t2.accent;regBtn.style.color=t2.accent;
  } else {
    regBtn.style.display='none';
  }
}

async function send(){
  if(isLoading) return;
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text) return;
  chatLog.push({role:'user',content:text});
  input.value='';input.style.height='';
  saveChat();renderMessages();

  isLoading=true;
  document.getElementById('send-btn').textContent='…';
  const [provider,model]=selectedModel.split(':');
  try{
    const reply=await callAPI(provider,model,SYSTEM_PROMPT,chatLog.slice(-20));
    chatLog.push({role:'assistant',content:reply});
    saveChat();renderMessages();
  }catch(e){
    showToast('⚠ '+e.message);
  }
  isLoading=false;
  document.getElementById('send-btn').textContent='送信 ↑';
}

function autoResize(el){el.style.height='';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// Ctrl+Enterで送信
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();send();}
});

// ══════════════════════════════════════════════
//  キャラ登録（メインアプリに人格追加）
// ══════════════════════════════════════════════
function registerCharacter(){
  // 最後のAI発言から【プロンプト完成】部分を抽出
  const lastAi=chatLog.filter(m=>m.role==='assistant').slice(-1)[0];
  if(!lastAi) return;
  const match=lastAi.content.match(/【プロンプト完成】([\s\S]*?)(?:【|$)/);
  const prompt=match?match[1].trim():lastAi.content;

  // メインアプリのpersonasに追加
  try{
    const raw=localStorage.getItem('ai_personas_light');// widget_stateからは読めないのでIndexedDB経由
    // localStorageには軽量版しかないので、ユーザーに案内
    showToast('📋 プロンプトをコピーしました！メインアプリで新しいキャラを作成し、システムプロンプトに貼り付けてください。');
    navigator.clipboard.writeText(prompt).catch(()=>{});
  }catch(e){
    showToast('⚠ エラー: '+e.message);
  }
}

// ══════════════════════════════════════════════
//  エクスポート・クリア
// ══════════════════════════════════════════════
function exportChat(){
  if(chatLog.length===0){showToast('会話がありません');return;}
  let txt='📦 お引越し 会話ログ\n';
  txt+='日時: '+new Date().toLocaleString('ja-JP')+'\n';
  txt+='========================================\n\n';
  chatLog.forEach(m=>{
    txt+='['+(m.role==='user'?'あなた':'管理人さん')+']\n';
    txt+=m.content+'\n\n';
  });
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='relocation_'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
  showToast('📥 エクスポートしました');
}

function clearChat(){
  if(chatLog.length===0) return;
  if(!confirm('会話をクリアしますか？')) return;
  chatLog=[];saveChat();renderMessages();
  showToast('🗑 クリアしました');
}

// ファイル読み込み
function handleFile(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    let text=e.target.result;
    // HTML→テキスト変換
    if(file.name.endsWith('.html')||file.name.endsWith('.htm')){
      const tmp=document.createElement('div');
      tmp.innerHTML=text;
      text=tmp.textContent||tmp.innerText||'';
    }
    // JSON→整形
    if(file.name.endsWith('.json')){
      try{
        const json=JSON.parse(text);
        text='【JSONファイル: '+file.name+'】\n'+JSON.stringify(json,null,2).slice(0,3000);
        if(JSON.stringify(json).length>3000) text+='\n…（以下省略、全'+JSON.stringify(json).length+'文字）';
      }catch(_){/* そのまま */}
    }
    // 長すぎる場合は切り詰め
    if(text.length>4000){
      text=text.slice(0,4000)+'\n\n…（長いため最初の4000文字のみ表示。続きが必要なら教えてください）';
    }
    const input=document.getElementById('input');
    input.value='【ファイル: '+file.name+'】\n'+text;
    autoResize(input);
    showToast('📎 '+file.name+' を読み込みました');
  };
  reader.onerror=()=>showToast('⚠ ファイルの読み込みに失敗しました');
  reader.readAsText(file);
  event.target.value='';// リセット
}

// ══════════════════════════════════════════════
//  モデルselect生成
// ══════════════════════════════════════════════
function populateModelSelect(sel){
  sel.innerHTML='';
  MODEL_DEF.filter(m=>m.wizard).forEach(m=>{
    const opt=document.createElement('option');
    opt.value=m.value;opt.textContent=m.shortLabel;
    sel.appendChild(opt);
  });
  sel.value=selectedModel;
}

    saveChat();renderMessages();

}
init();
