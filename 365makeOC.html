<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>365dAIary - OCアイディア帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#111114;--surface:#1a1a1e;--surface2:#222228;--border:#333340;--text:#e8e8f0;--text-muted:#666680;--accent:#aaaacc}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── ヘッダー ── */
.header{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface);gap:8px;min-height:48px;flex-shrink:0}
.header a{color:var(--text-muted);text-decoration:none;font-size:18px}
.header-title{flex:1;font-family:monospace;font-size:13px;letter-spacing:2px;text-align:center}
.header select{font-family:monospace;font-size:10px;padding:4px 6px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);max-width:140px}
.header button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px 8px}

/* ── メッセージエリア ── */
.messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text)}
.msg.user{align-self:flex-end;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.msg-label{font-family:monospace;font-size:9px;color:var(--text-muted);margin-bottom:2px}

/* ── 入力エリア ── */
.input-area{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:var(--surface);align-items:flex-end;flex-shrink:0}
.input-area textarea{flex:1;font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);resize:none;min-height:44px;max-height:200px;line-height:1.6}
.input-area button{padding:8px 16px;border-radius:8px;border:none;font-family:monospace;font-size:12px;cursor:pointer;white-space:nowrap}

/* ── ツール（キャラ登録ボタン） ── */
.register-btn{display:none;margin:8px 12px;padding:12px;border-radius:8px;border:2px dashed var(--accent);text-align:center;font-family:monospace;font-size:12px;cursor:pointer;color:var(--accent);background:none}
.register-btn:hover{background:var(--surface2)}

/* ── トースト ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;font-family:monospace;font-size:11px;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* ── サイドバー ── */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none}
.sidebar-overlay.open{display:block}
.sidebar{position:fixed;top:0;right:-280px;width:270px;height:100%;background:var(--surface);border-left:1px solid var(--border);z-index:101;transition:right .25s ease;display:flex;flex-direction:column;overflow:hidden}
.sidebar.open{right:0}
.sb-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--border);font-family:monospace;font-size:12px;letter-spacing:1px}
.sb-hdr button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px}
.sb-list{flex:1;overflow-y:auto;padding:8px}
.sb-item{padding:10px;border-radius:6px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;font-size:12px;line-height:1.6;display:flex;justify-content:space-between;align-items:center}
.sb-item:hover{background:var(--surface2)}
.sb-item.active{border-color:var(--accent);background:var(--surface2)}
.sb-item-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:10px;padding:2px 6px;opacity:.5}
.sb-item-del:hover{opacity:1}
.sb-new{margin:8px;padding:10px;border-radius:6px;border:1px dashed var(--accent);text-align:center;font-family:monospace;font-size:11px;cursor:pointer;color:var(--accent)}
.sb-new:hover{background:var(--surface2)}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header" id="header">
  <a href="index.html" title="戻る">←</a>
  <div class="header-title">📔 OCアイディア帳</div>
  <div id="cost-display" style="font-size:9px;opacity:.5;font-family:monospace;white-space:nowrap" title="このセッションの概算コスト">💰 $0.0000</div>
  <select id="model-select" onchange="saveModel()"></select>
  <button onclick="exportChat()" title="エクスポート">📥</button>
  <button onclick="clearChat()" title="クリア">🗑</button>
  <button onclick="toggleSidebar()" title="会話履歴" style="font-size:16px">📂</button>
</div>

<!-- メッセージエリア -->
<div class="messages" id="messages"></div>

<!-- ↓ スクロールボタン -->
<button id="scroll-bottom-btn" onclick="scrollToBottom()" style="display:none;position:fixed;bottom:80px;right:16px;z-index:90;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--accent);font-size:16px;cursor:pointer;opacity:.8;box-shadow:0 2px 8px rgba(0,0,0,.15);font-family:monospace" title="一番下へ">↓</button>

<!-- キャラ登録ボタン（プロンプト完成後に表示） -->
<div class="register-btn" id="register-btn" onclick="registerCharacter()">
  🚀 このキャラを365dAIaryに登録する
</div>

<!-- 入力エリア -->
<div class="input-area" id="input-area">
  <textarea id="input" placeholder="管理人さんに相談しよう…" rows="1" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="send()">送信 ↑</button>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- サイドバー -->
<div class="sidebar-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-hdr"><span>📂 会話履歴</span><button onclick="toggleSidebar()">✕</button></div>
  <div class="sb-new" onclick="newSession()">＋ 新しいOC案を始める</div>
  <!-- プロジェクト管理 -->
  <div style="padding:4px 8px">
    <select id="project-filter" onchange="renderSidebar()" style="width:100%;font-size:11px;font-family:monospace;padding:6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text)">
      <option value="">すべて表示</option>
    </select>
    <div style="display:flex;gap:4px;margin-top:4px">
      <button onclick="createProject()" style="flex:1;font-size:10px;font-family:monospace;padding:4px;border:1px dashed var(--accent);border-radius:4px;background:none;color:var(--accent);cursor:pointer">📁 新規作品</button>
      <button onclick="editProjectMemo()" style="flex:1;font-size:10px;font-family:monospace;padding:4px;border:1px dashed var(--accent);border-radius:4px;background:none;color:var(--accent);cursor:pointer">📝 共通メモ</button>
    </div>
  </div>
  <div class="sb-list" id="sb-list"></div>
</div>

//  ユーティリティ
// ══════════════════════════════════════════════
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}

let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  const t=THEMES[currentTheme]||THEMES.dark;
  el.style.background=t.surface;el.style.color=t.text;el.style.border='1px solid '+t.border;
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

let currentTheme = localStorage.getItem('ai_theme')||'dark';

function applyTheme(name){
  const t=THEMES[name]||THEMES.dark;
  currentTheme=name;
  const r=document.documentElement.style;
  r.setProperty('--bg',t.bg);r.setProperty('--surface',t.surface);r.setProperty('--surface2',t.surface2);
  r.setProperty('--border',t.border);r.setProperty('--text',t.text);r.setProperty('--text-muted',t.textMuted);
  r.setProperty('--accent',t.accent);
  document.getElementById('send-btn').style.background=t.sendBtn;
  document.getElementById('send-btn').style.color='#fff';

//  API呼び出し
// ══════════════════════════════════════════════
let totalCost=0;

async function callAPI(provider,model,systemPrompt,history){
  const mt=2000;
  async function doFetch(url,opts){
    let res;
    try{res=await fetch(url,opts);}catch(err){throw new Error('通信エラー: '+err.message);}
    if(!res.ok){let msg=res.statusText;try{const ej=await res.json();msg=ej.error?.message||ej.message||msg;}catch(_){}throw new Error('APIエラー '+res.status+': '+msg);}
    return res.json();
  }
  let usageIn=0,usageOut=0,reply='';
  if(provider==='openai'){
    const key=localStorage.getItem('key_openai');
    if(!key) throw new Error('OpenAI APIキーが未設定です。メインアプリの⚙で設定してください。');
    const data=await doFetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,messages:[{role:'system',content:systemPrompt},...history],max_tokens:mt})});
    reply=data.choices[0].message.content;usageIn=data.usage?.prompt_tokens||0;usageOut=data.usage?.completion_tokens||0;
  } else if(provider==='anthropic'){
    const key=localStorage.getItem('key_anthropic');
    if(!key) throw new Error('Anthropic APIキーが未設定です。メインアプリの⚙で設定してください。');
    const data=await doFetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,system:systemPrompt,messages:history,max_tokens:mt})});
    reply=data.content[0].text;usageIn=data.usage?.input_tokens||0;usageOut=data.usage?.output_tokens||0;
  } else if(provider==='google'){
    const key=localStorage.getItem('key_google');
    if(!key) throw new Error('Google APIキーが未設定です。メインアプリの⚙で設定してください。');
    const contents=history.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    const data=await doFetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:systemPrompt}]},contents,generationConfig:{maxOutputTokens:mt}})});
    reply=data.candidates[0].content.parts[0].text;usageIn=data.usageMetadata?.promptTokenCount||0;usageOut=data.usageMetadata?.candidatesTokenCount||0;
  }
  const price=MODEL_PRICE[model]||{in:0.002,out:0.002};
  totalCost+=(usageIn/1000)*price.in+(usageOut/1000)*price.out;
  updateCostDisplay();
  return reply;
}

function updateCostDisplay(){
  const el=document.getElementById('cost-display');
  if(el) el.textContent='💰 $'+totalCost.toFixed(4);
}

const STORAGE_KEY='kanrinin_makeoc_log';
const SESSIONS_KEY='kanrinin_makeoc_sessions';
const PROJECTS_KEY='kanrinin_makeoc_projects';
let chatLog=[];// [{role,content,timestamp}]
let sessions=[];// [{id,title,msgs,createdAt,project}]
let projects=[];// [{id,name,memo}]
let currentSessionId=null;
let isLoading=false;
let selectedModel=localStorage.getItem('kanrinin_model')||'openai:gpt-4.1-mini';

function loadProjects(){
  try{ projects=JSON.parse(localStorage.getItem(PROJECTS_KEY))||[]; }catch(e){ projects=[]; }
}
function saveProjects(){
  localStorage.setItem(PROJECTS_KEY,JSON.stringify(projects));
}
function createProject(){
  const name=prompt('作品名を入力してください','');
  if(!name||!name.trim()) return;
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  projects.push({id,name:name.trim(),memo:''});
  saveProjects();
  renderProjectFilter();
  // 作成したプロジェクトを選択状態に
  document.getElementById('project-filter').value=id;
  renderSidebar();
  showToast('📁 「'+name.trim()+'」を作成しました');
}
function editProjectMemo(){
  const sel=document.getElementById('project-filter').value;
  if(!sel){
    showToast('先にプロジェクトを選択してください');
    return;
  }
  const proj=projects.find(p=>p.id===sel);
  if(!proj) return;
  const memo=prompt('「'+proj.name+'」の共通メモ（世界観・設定など）\n\n※ キャラ登録時にこのメモが全キャラに共通で入ります',proj.memo||'');
  if(memo===null) return;// キャンセル
  proj.memo=memo;
  saveProjects();
  showToast('📝 共通メモを更新しました');
}
function renderProjectFilter(){
  const sel=document.getElementById('project-filter');
  const current=sel.value;
  sel.innerHTML='<option value="">すべて表示</option>';
  projects.forEach(p=>{
    const opt=document.createElement('option');
    opt.value=p.id;
    opt.textContent='📁 '+p.name;
    sel.appendChild(opt);
  });
  sel.value=current;
}
function assignProject(sessionId){
  const sel=document.getElementById('project-filter').value;
  if(!sel){
    // プロジェクト一覧から選ばせる
    if(projects.length===0){
      showToast('先にプロジェクトを作成してください');
      return;
    }
    const names=projects.map((p,i)=>(i+1)+'. '+p.name).join('\n');
    const choice=prompt('どのプロジェクトに入れますか？\n'+names+'\n\n番号を入力：');
    if(!choice) return;
    const idx=parseInt(choice)-1;
    if(idx<0||idx>=projects.length){showToast('無効な番号です');return;}
    const sess=sessions.find(s=>s.id===sessionId);
    if(sess){sess.project=projects[idx].id;saveChat();renderSidebar();}
    showToast('📁 「'+projects[idx].name+'」に追加しました');
  } else {
    const sess=sessions.find(s=>s.id===sessionId);
    if(sess){sess.project=sel;saveChat();renderSidebar();}
    const proj=projects.find(p=>p.id===sel);
    showToast('📁 「'+(proj?.name||'')+'」に追加しました');
  }
}

function saveModel(){
  selectedModel=document.getElementById('model-select').value;
  localStorage.setItem('kanrinin_model',selectedModel);
}

function loadChat(){
  // マイグレーション：旧形式（単一chatLog）→セッション形式
  try{ sessions=JSON.parse(localStorage.getItem(SESSIONS_KEY))||[]; }catch(e){ sessions=[]; }
  if(sessions.length===0){
    const old=localStorage.getItem(STORAGE_KEY);
    if(old){
      try{
        const oldLog=JSON.parse(old);
        if(oldLog.length>0){
          const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
          const title=(oldLog.find(m=>m.role==='user')||{}).content||'OC案';
          sessions.push({id,title:title.slice(0,24),msgs:oldLog,createdAt:Date.now()});
          currentSessionId=id;
          localStorage.removeItem(STORAGE_KEY);
        }
      }catch(e){}
    }
  }
  if(sessions.length>0 && !currentSessionId){
    currentSessionId=sessions[sessions.length-1].id;
  }
  chatLog=currentSession()?.msgs||[];
}

function currentSession(){
  return sessions.find(s=>s.id===currentSessionId)||null;
}

function saveChat(){
  const sess=currentSession();
  if(sess) sess.msgs=chatLog;
  localStorage.setItem(SESSIONS_KEY,JSON.stringify(sessions));
}

function newSession(){
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  sessions.push({id,title:'新しいOC案',msgs:[],createdAt:Date.now()});
  currentSessionId=id;
  chatLog=[];
  saveChat();renderMessages();renderSidebar();
  toggleSidebar();
}

function switchSession(id){
  const sess=sessions.find(s=>s.id===id);
  if(!sess) return;
  currentSessionId=id;
  chatLog=sess.msgs;
  renderMessages();renderSidebar();
  toggleSidebar();
}

function deleteSession(id,e){
  e.stopPropagation();
  if(!confirm('この会話を削除しますか？')) return;
  sessions=sessions.filter(s=>s.id!==id);
  if(currentSessionId===id){
    currentSessionId=sessions.length>0?sessions[sessions.length-1].id:null;
    chatLog=currentSession()?.msgs||[];
  }
  saveChat();renderMessages();renderSidebar();
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('open');
  renderSidebar();
}

function renderSidebar(){
  const list=document.getElementById('sb-list');
  const t=THEMES[currentTheme]||THEMES.dark;
  const filterProject=document.getElementById('project-filter').value;
  list.innerHTML='';
  const filtered=sessions.filter(s=>{
    if(!filterProject) return true;
    return s.project===filterProject;
  });
  filtered.slice().reverse().forEach(s=>{
    const item=document.createElement('div');
    item.className='sb-item'+(s.id===currentSessionId?' active':'');
    const titleSpan=document.createElement('span');
    titleSpan.className='sb-item-title';
    // プロジェクト名をプレフィックスで表示（フィルターしてない時）
    const proj=projects.find(p=>p.id===s.project);
    titleSpan.textContent=(proj&&!filterProject?'['+proj.name+'] ':'')+s.title;
    // 長押しでタイトル編集（スマホ対応）
    let pressTimer=null;
    titleSpan.addEventListener('touchstart',()=>{
      pressTimer=setTimeout(()=>{startRenameSession(s.id,titleSpan);},600);
    },{passive:true});
    titleSpan.addEventListener('touchend',()=>{clearTimeout(pressTimer);});
    titleSpan.addEventListener('touchmove',()=>{clearTimeout(pressTimer);});
    // ✏️ 編集ボタン
    const editBtn=document.createElement('button');
    editBtn.className='sb-item-del';
    editBtn.textContent='✏️';
    editBtn.style.fontSize='11px';
    editBtn.style.opacity='.6';
    editBtn.title='タイトル変更';
    editBtn.onclick=(e)=>{e.stopPropagation();startRenameSession(s.id,titleSpan);};
    // 📁 プロジェクト割り当てボタン
    const folderBtn=document.createElement('button');
    folderBtn.className='sb-item-del';
    folderBtn.textContent='📁';
    folderBtn.style.fontSize='11px';
    folderBtn.style.opacity='.5';
    folderBtn.title='プロジェクトに入れる';
    folderBtn.onclick=(e)=>{e.stopPropagation();assignProject(s.id);};
    const delBtn=document.createElement('button');
    delBtn.className='sb-item-del';
    delBtn.textContent='✕';
    delBtn.onclick=(e)=>deleteSession(s.id,e);
    item.appendChild(titleSpan);
    item.appendChild(editBtn);
    item.appendChild(folderBtn);
    item.appendChild(delBtn);
    item.onclick=()=>switchSession(s.id);
    list.appendChild(item);
  });
  if(filtered.length===0){
    list.innerHTML='<div style="text-align:center;opacity:.4;font-family:monospace;font-size:11px;padding:20px">'+(filterProject?'このプロジェクトにはまだ会話がありません':'まだ会話がありません')+'</div>';
  }
}

function startRenameSession(id,titleSpan){
  const sess=sessions.find(s=>s.id===id);
  if(!sess) return;
  const input=document.createElement('input');
  input.type='text';
  input.value=sess.title;
  input.style.cssText='width:100%;font-size:12px;font-family:monospace;padding:2px 4px;border:1px solid var(--accent);border-radius:4px;background:var(--surface);color:var(--text);outline:none';
  const finish=()=>{
    const newTitle=input.value.trim();
    if(newTitle&&newTitle!==sess.title){
      sess.title=newTitle;
      saveChat();
      showToast('✏️ タイトルを変更しました');
    }
    renderSidebar();
  };
  input.onblur=finish;
  input.onkeydown=(e)=>{
    if(e.key==='Enter'){e.preventDefault();input.blur();}
    if(e.key==='Escape'){input.value=sess.title;input.blur();}
  };
  titleSpan.replaceWith(input);
  input.focus();
  input.select();
}

function renderMessages(){
  const container=document.getElementById('messages');
  const t=THEMES[currentTheme]||THEMES.dark;
  container.innerHTML='';
  if(chatLog.length===0){
    container.innerHTML='<div style="text-align:center;opacity:.4;font-family:monospace;font-size:12px;padding:40px 20px;line-height:2">📔 OCアイディア帳<br><br>管理人さんと一緒に<br>あなただけのAIキャラを作ろう！<br><br>「ツンデレキャラ作りたい」<br>「こんな設定のキャラがいて…」<br>なんでも話してみてね</div>';
    return;
  }
  chatLog.forEach((m,idx)=>{
    const isUser=m.role==='user';
    const wrap=document.createElement('div');
    wrap.style.display='flex';wrap.style.flexDirection='column';
    const label=document.createElement('div');
    label.className='msg-label';
    label.textContent=isUser?'あなた':'🎨 管理人さん';
    label.style.textAlign=isUser?'right':'left';
    // alternatesがあれば現在選択中を表示
    const displayContent=m.alternates?m.alternates[m.activeAlt||0]:m.content;
    const bubble=document.createElement('div');
    bubble.className='msg '+(isUser?'user':'ai');
    if(isUser){
      bubble.style.background=t.userBubble||t.surface2;
      bubble.style.borderColor=t.userBorder||t.border;
      bubble.style.color=t.userText||t.text;
    } else {
      bubble.style.background=t.aiBubble||t.surface;
      bubble.style.borderColor=t.aiBorder||t.border;
      bubble.style.color=t.text;
    }
    bubble.textContent=displayContent;
    // 長押し/右クリックでコンテキストメニュー
    let pressTimer=null;
    const showMenu=(e)=>{
      e.preventDefault();
      openMsgMenu(idx,m,e.clientX||e.touches?.[0]?.clientX||0,e.clientY||e.touches?.[0]?.clientY||0);
    };
    bubble.addEventListener('contextmenu',showMenu);
    bubble.addEventListener('touchstart',(e)=>{pressTimer=setTimeout(()=>showMenu(e),500);},{passive:false});
    bubble.addEventListener('touchend',()=>clearTimeout(pressTimer));
    bubble.addEventListener('touchmove',()=>clearTimeout(pressTimer));
    bubble.style.cursor='context-menu';
    wrap.appendChild(label);wrap.appendChild(bubble);
    // タイムスタンプ
    if(m.timestamp){
      const timeEl=document.createElement('div');
      timeEl.style.cssText='font-size:10px;opacity:.4;margin-top:2px;font-family:monospace';
      timeEl.style.textAlign=isUser?'right':'left';
      timeEl.style.color=t.textMuted||t.text;
      timeEl.textContent=new Date(m.timestamp).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      wrap.appendChild(timeEl);
    }
    // AI発言：再生成ボタン＋alternatesナビ
    if(!isUser){
      const bottomRow=document.createElement('div');
      bottomRow.style.cssText='display:flex;align-items:center;gap:4px;';
      const regenBtn=document.createElement('button');
      regenBtn.style.cssText='background:none;border:none;cursor:pointer;font-size:12px;padding:2px 4px;opacity:.5';
      regenBtn.style.color=t.textMuted||t.text;
      regenBtn.textContent='🔄';
      regenBtn.title='再生成';
      regenBtn.onclick=()=>regenerateMsg(idx);
      bottomRow.appendChild(regenBtn);
      // alternatesナビ（2つ以上あるとき）
      if(m.alternates&&m.alternates.length>1){
        const cur=m.activeAlt||0;
        const nav=document.createElement('div');
        nav.style.cssText='display:flex;align-items:center;gap:4px;font-family:monospace;font-size:10px;opacity:.6';
        nav.style.color=t.textMuted||t.text;
        const prevBtn=document.createElement('button');
        prevBtn.textContent='‹';
        prevBtn.style.cssText='background:none;border:none;cursor:pointer;font-size:14px;padding:0 4px';
        prevBtn.style.color=t.textMuted||t.text;
        prevBtn.disabled=cur===0;
        prevBtn.onclick=()=>{m.activeAlt=cur-1;saveChat();renderMessages();};
        const lbl=document.createElement('span');
        lbl.textContent=(cur+1)+' / '+m.alternates.length;
        const nextBtn=document.createElement('button');
        nextBtn.textContent='›';
        nextBtn.style.cssText='background:none;border:none;cursor:pointer;font-size:14px;padding:0 4px';
        nextBtn.style.color=t.textMuted||t.text;
        nextBtn.disabled=cur>=m.alternates.length-1;
        nextBtn.onclick=()=>{m.activeAlt=cur+1;saveChat();renderMessages();};
        nav.appendChild(prevBtn);nav.appendChild(lbl);nav.appendChild(nextBtn);
        bottomRow.appendChild(nav);
      }
      wrap.appendChild(bottomRow);
    }
    container.appendChild(wrap);
  });
  container.scrollTop=container.scrollHeight;
  // プロンプト完成検出→登録ボタン表示
  const lastAi=chatLog.filter(m=>m.role==='assistant').slice(-1)[0];
  const regBtn=document.getElementById('register-btn');
  const lastContent=lastAi?(lastAi.alternates?lastAi.alternates[lastAi.activeAlt||0]:lastAi.content):'';
  if(lastContent.includes('【プロンプト完成】')){
    regBtn.style.display='block';
    const t2=THEMES[currentTheme];
    regBtn.style.borderColor=t2.accent;regBtn.style.color=t2.accent;
  } else {
    regBtn.style.display='none';
  }
}

// ── コンテキストメニュー（コピー・書き直し） ──
function openMsgMenu(msgIdx,msg,x,y){
  let old=document.getElementById('oc-msg-menu');
  if(old) old.remove();
  const t=THEMES[currentTheme]||THEMES.dark;
  const menu=document.createElement('div');
  menu.id='oc-msg-menu';
  menu.style.cssText='position:fixed;z-index:99999;background:'+t.bg+';border:1px solid '+t.border+';border-radius:10px;padding:6px 0;box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:140px';
  menu.style.left=Math.min(x,window.innerWidth-160)+'px';
  menu.style.top=Math.min(y,window.innerHeight-120)+'px';
  const displayContent=msg.alternates?msg.alternates[msg.activeAlt||0]:msg.content;
  const items=[
    {label:'📋 コピー',action:()=>{navigator.clipboard.writeText(displayContent).then(()=>showToast('コピーしました')).catch(()=>showToast('⚠ コピーに失敗'));}}
  ];
  if(msg.role==='user'){
    items.push({label:'✏️ 書き直し',action:()=>{
      const input=document.getElementById('input');
      input.value=msg.content;
      input.focus();
      chatLog.splice(msgIdx);
      saveChat();renderMessages();
      showToast('入力欄にコピーしました。編集して再送信してね');
    }});
  }
  items.forEach(it=>{
    const btn=document.createElement('button');
    btn.textContent=it.label;
    btn.style.cssText='display:block;width:100%;text-align:left;padding:8px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:'+t.text+';font-family:inherit';
    btn.onmouseenter=()=>btn.style.background=t.surface;
    btn.onmouseleave=()=>btn.style.background='none';
    btn.onclick=()=>{menu.remove();it.action();};
    menu.appendChild(btn);
  });
  document.body.appendChild(menu);
  setTimeout(()=>{
    const closer=(e)=>{if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',closer);}};
    document.addEventListener('click',closer);
  },10);
}

// ── 再生成 ──
async function regenerateMsg(msgIdx){
  if(isLoading) return;
  const msg=chatLog[msgIdx];
  if(!msg||msg.role!=='assistant') return;
  // alternates初期化
  if(!msg.alternates){
    msg.alternates=[msg.content];
    msg.activeAlt=0;
  }
  // 再生成用の履歴（該当メッセージより前まで）
  const history=chatLog.slice(0,msgIdx);
  isLoading=true;
  document.getElementById('send-btn').textContent='…';
  const [provider,model]=selectedModel.split(':');
  try{
    const reply=await callAPI(provider,model,buildMakeOCPrompt(),history.slice(-40));
    msg.alternates.push(reply);
    msg.activeAlt=msg.alternates.length-1;
    msg.content=reply;
    msg.timestamp=Date.now();
    saveChat();renderMessages();
    showToast('🔄 再生成しました（'+msg.alternates.length+'件目）');
  }catch(e){
    showToast('⚠ '+e.message);
  }
  isLoading=false;
  document.getElementById('send-btn').textContent='送信 ↑';
}

async function send(){
  if(isLoading) return;
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text) return;
  // セッションがなければ自動作成
  if(!currentSessionId){
    const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    sessions.push({id,title:text.slice(0,24),msgs:[],createdAt:Date.now()});
    currentSessionId=id;
    chatLog=[];
  }
  // 最初の発言ならタイトル更新
  const sess=currentSession();
  if(sess && sess.msgs.length===0){
    sess.title=text.slice(0,24);
  }
  chatLog.push({role:'user',content:text,timestamp:Date.now()});
  input.value='';input.style.height='';
  saveChat();renderMessages();

  isLoading=true;
  document.getElementById('send-btn').textContent='…';
  const [provider,model]=selectedModel.split(':');
  try{
    // 会話が長い場合、要約付きでシステムプロンプトを構築
    const sysPrompt=buildMakeOCPrompt();
    const reply=await callAPI(provider,model,sysPrompt,chatLog.slice(-40));
    chatLog.push({role:'assistant',content:reply,timestamp:Date.now()});
    saveChat();renderMessages();
    // 30件ごとに自動要約を裏で走らせる
    if(chatLog.length>0 && chatLog.length%30===0){
      autoSummarize(provider,model);
    }
  }catch(e){
    showToast('⚠ '+e.message);
  }
  isLoading=false;
  document.getElementById('send-btn').textContent='送信 ↑';
}

// ── 自動要約（バックグラウンド） ──
async function autoSummarize(provider,model){
  const sess=currentSession();
  if(!sess||chatLog.length<20) return;
  try{
    const summaryPrompt='以下の会話をキャラクター設計の観点で簡潔に要約してください。決まったこと（名前・性格・口調・設定・関係性）を箇条書きで。まだ決まっていないことも明記。300文字以内。\n\n'+
      chatLog.map(m=>'['+(m.role==='user'?'ユーザー':'管理人さん')+']\n'+m.content).join('\n\n');
    const summary=await callAPI(provider,model,'あなたは会話の要約係です。純粋に情報整理のみ行い、感想や萌え表現は入れないでください。',[{role:'user',content:summaryPrompt}]);
    sess.summary=summary;
    saveChat();
    showToast('📋 ここまでのまとめを保存しました');
  }catch(e){
    // 要約失敗は無視（メインの会話に影響させない）
  }
}

// ── システムプロンプト構築（要約がある場合は含める） ──
function buildMakeOCPrompt(){
  const sess=currentSession();
  if(sess?.summary){
    return SYSTEM_PROMPT+'\n\n## ここまでの会話のまとめ\n'+sess.summary;
  }
  return SYSTEM_PROMPT;
}

// ══════════════════════════════════════════════
//  キャラ登録（メインアプリに人格追加）
// ══════════════════════════════════════════════
function registerCharacter(){
  // 最後のAI発言から【プロンプト完成】部分を抽出
  const lastAi=chatLog.filter(m=>m.role==='assistant').slice(-1)[0];
  if(!lastAi) return;
  const displayContent=lastAi.alternates?lastAi.alternates[lastAi.activeAlt||0]:lastAi.content;
  const match=displayContent.match(/【プロンプト完成】([\s\S]*?)(?:【|$)/);
  const prompt=match?match[1].trim():displayContent;

  // このセッションのプロジェクト共通メモを取得
  const sess=currentSession();
  const proj=sess?.project?projects.find(p=>p.id===sess.project):null;
  const sharedMemo=proj?.memo||'';

  // 名前入力ダイアログ
  const name=window.prompt('キャラの名前を入力してください','');
  if(!name||!name.trim()) return;
  const charName=name.trim();

  // 共通メモがあれば確認
  if(sharedMemo){
    if(!confirm('「'+proj.name+'」の共通メモを思い出メモに入れますか？\n\n'+sharedMemo.slice(0,100)+(sharedMemo.length>100?'…':''))){
      // 共通メモなしで登録
    }
  }
  const includeSharedMemo=sharedMemo&&confirm.length!==undefined;// confirmが呼ばれてtrueならinclude

  // IndexedDBからmainのpersonas読み込み → 追加 → 書き戻し
  const DB_NAME='365dAIaryDB';
  const STORE_NAME='kv';
  const req=indexedDB.open(DB_NAME,1);
  req.onupgradeneeded=e=>{
    const db=e.target.result;
    if(!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
  };
  req.onsuccess=e=>{
    const db=e.target.result;
    const tx=db.transaction(STORE_NAME,'readwrite');
    const st=tx.objectStore(STORE_NAME);
    const getReq=st.get('ai_personas');
    getReq.onsuccess=()=>{
      let personas=getReq.result||[];
      // 共通メモ → 思い出メモ用
      const sharedMemories=sharedMemo?[{cat:'🌍 世界観（共通）',text:sharedMemo}]:[];
      // 同名キャラチェック
      const existing=personas.find(p=>p.aiName===charName);
      if(existing){
        if(!confirm('「'+charName+'」は既に存在します。プロンプトを上書きしますか？')){
          navigator.clipboard.writeText(prompt).catch(()=>{});
          showToast('📋 プロンプトをコピーしました');
          return;
        }
        existing.systemPrompt=prompt;
        // 共通メモがあれば思い出メモに追加（重複チェック）
        if(sharedMemo&&!existing.memories?.some(m=>m.cat==='🌍 世界観（共通）')){
          if(!existing.memories) existing.memories=[];
          existing.memories.unshift({cat:'🌍 世界観（共通）',text:sharedMemo});
        } else if(sharedMemo){
          // 既にあれば更新
          const idx=existing.memories.findIndex(m=>m.cat==='🌍 世界観（共通）');
          if(idx>=0) existing.memories[idx].text=sharedMemo;
        }
        showToast('✅ 「'+charName+'」のプロンプトを更新しました！');
      } else {
        const newId=Date.now().toString(36)+Math.random().toString(36).slice(2);
        personas.push({
          id:newId,
          aiName:charName,
          userName:'あなた',
          model:'openai:gpt-4.1-mini',
          systemPrompt:prompt,
          memories:sharedMemories,
          diary:[],
          diaryMode:'off',
          sessions:[]
        });
        showToast('🚀 「'+charName+'」を365dAIaryに登録しました！'+(sharedMemo?'共通メモも追加済み！':'')+'メインアプリを開いてね');
      }
      const tx2=db.transaction(STORE_NAME,'readwrite');
      const st2=tx2.objectStore(STORE_NAME);
      st2.put(personas,'ai_personas');
      navigator.clipboard.writeText(prompt).catch(()=>{});
    };
    getReq.onerror=()=>{
      showToast('⚠ メインアプリのデータにアクセスできませんでした。プロンプトをコピーします。');
      navigator.clipboard.writeText(prompt).catch(()=>{});
    };
  };
  req.onerror=()=>{
    showToast('⚠ データベースを開けませんでした。プロンプトをコピーします。');
    navigator.clipboard.writeText(prompt).catch(()=>{});
  };
}

// ══════════════════════════════════════════════
//  エクスポート・クリア
// ══════════════════════════════════════════════
function exportChat(){
  if(chatLog.length===0){showToast('会話がありません');return;}
  let txt='📔 OCアイディア帳 会話ログ\n';
  txt+='日時: '+new Date().toLocaleString('ja-JP')+'\n';
  txt+='========================================\n\n';
  chatLog.forEach(m=>{
    txt+='['+(m.role==='user'?'あなた':'管理人さん')+']\n';
    txt+=m.content+'\n\n';
  });
  const bom=new Uint8Array([0xEF,0xBB,0xBF]);
  const blob=new Blob([bom,txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='makeOC_'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
  showToast('📥 エクスポートしました');
}

function clearChat(){
  if(chatLog.length===0) return;
  if(!confirm('この会話をクリアしますか？')) return;
  chatLog=[];saveChat();renderMessages();renderSidebar();
  showToast('🗑 クリアしました');
}

// ══════════════════════════════════════════════
//  モデルselect生成
// ══════════════════════════════════════════════
function populateModelSelect(sel){
  sel.innerHTML='';
  MODEL_DEF.filter(m=>m.wizard).forEach(m=>{
    const opt=document.createElement('option');
    opt.value=m.value;opt.textContent=m.shortLabel;
    sel.appendChild(opt);
  });
  sel.value=selectedModel;
}

// ══════════════════════════════════════════════
//  初期化
// ══════════════════════════════════════════════
function init(){
  loadChat();
  loadProjects();
  populateModelSelect(document.getElementById('model-select'));
  document.getElementById('model-select').value=selectedModel;
  applyTheme(currentTheme);
  renderMessages();
  renderProjectFilter();
  // 初回なら管理人さんの挨拶＋セッション作成
  if(chatLog.length===0 && sessions.length===0){
    const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    sessions.push({id,title:'はじめてのOC案',msgs:[],createdAt:Date.now()});
    currentSessionId=id;
    chatLog=currentSession().msgs;
    chatLog.push({role:'assistant',content:'こんにちは！管理人さんです🎨\n\n今日はどんなキャラを作りたいですか？\n\n・「ツンデレの男の子」みたいにざっくりでもOK\n・既存のキャラのプロンプトを見てほしい、でもOK\n・テンプレートから選びたい、でもOK\n\nなんでも聞いてくださいね！✨',timestamp:Date.now()});
    saveChat();renderMessages();
  }
  renderSidebar();
  initScrollBtn();
}

function scrollToBottom(){
  const c=document.getElementById('messages');
  c.scrollTop=c.scrollHeight;
}
function initScrollBtn(){
  const c=document.getElementById('messages');
  const btn=document.getElementById('scroll-bottom-btn');
  if(!c||!btn) return;
  c.addEventListener('scroll',()=>{
    const dist=c.scrollHeight-c.scrollTop-c.clientHeight;
    btn.style.display=dist>200?'block':'none';
  });
}

init();
